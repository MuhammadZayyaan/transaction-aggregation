services:
  postgres:
    image: postgres:16-alpine
    container_name: mzr-postgres
    environment:
      POSTGRES_DB: transaction_aggregation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mzr-app
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT_NAME: local
      DB_CONNECTION_URL: jdbc:postgresql://postgres:5432/transaction_aggregation_db?sslmode=disable
      DB_CONNECTION_USER: postgres
      DB_CONNECTION_PASS: postgres
      JWT_SECRET: tx-agg-dev-secret-key-change-in-production-min-256-bits!!
      PAYMENTS_API_URL: http://localhost:8080/transaction-aggregation/mock/api/payments
      TRANSFERS_API_URL: http://localhost:8080/transaction-aggregation/mock/api/transfers
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
