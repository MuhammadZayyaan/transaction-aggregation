### CORE CONFIGS
server.address=0.0.0.0
spring.profiles.active=${ENVIRONMENT_NAME:local}
spring.application.name=transaction-aggregation
spring.jmx.enabled=false

### SERVER CONFIGS
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/transaction-aggregation

### DATABASE CONFIGS
spring.datasource.url=${DB_CONNECTION_URL:jdbc:postgresql://localhost:5432/transaction_aggregation_db}
spring.datasource.username=${DB_CONNECTION_USER:postgres}
spring.datasource.password=${DB_CONNECTION_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

### LIQUIBASE
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
spring.liquibase.enabled=true

### JWT CONFIGS
jwt.secret=${JWT_SECRET:tx-agg-dev-secret-key-change-in-production-min-256-bits!!}
jwt.expiration-ms=${JWT_EXPIRATION:3600000}

### SESSION
session.inactivity-timeout-minutes=${SESSION_TIMEOUT:15}

### API TOKEN (Certificate-signed RSA)
api.token.keystore-path=${API_KEYSTORE_PATH:keystore/api-keystore.p12}
api.token.keystore-password=${API_KEYSTORE_PASSWORD:mzr-keystore-pass}
api.token.key-alias=${API_KEY_ALIAS:mzr-api-key}
api.token.expiration-ms=${API_TOKEN_EXPIRATION:3600000}

### LOGIN SECURITY
login.max-failed-attempts=${MAX_FAILED_ATTEMPTS:3}

### RATE LIMITING
rate-limit.window-seconds=${RATE_LIMIT_WINDOW:60}
rate-limit.login.max-requests=${RATE_LIMIT_LOGIN:5}
rate-limit.api.max-requests=${RATE_LIMIT_API:60}
rate-limit.token-generate.max-requests=${RATE_LIMIT_TOKEN_GEN:3}

### MOCK API URLs (point to real services in production)
mock.api.payments-url=${PAYMENTS_API_URL:http://localhost:8080/transaction-aggregation/mock/api/payments}
mock.api.transfers-url=${TRANSFERS_API_URL:http://localhost:8080/transaction-aggregation/mock/api/transfers}

### LOGGING
logging.level.root=INFO
logging.level.com.api.transaction_aggregation=DEBUG

### APP INFO
info.app.name=Transaction Aggregation API
info.app.description=REST API for transaction aggregation
info.app.version=0.0.1-SNAPSHOT

### OPENAPI / SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/transaction-aggregation/openapi/api-spec.yaml

#---
spring.config.activate.on-profile=local
app.schema=http
app.url=localhost:8080
spring.liquibase.contexts=local

#---
spring.config.activate.on-profile=int
app.schema=https
app.url=${APP_HOST:localhost}
logging.level.root=INFO
logging.level.com.api.transaction_aggregation=DEBUG
spring.jpa.show-sql=false
spring.liquibase.contexts=int

#---
spring.config.activate.on-profile=prod
app.schema=https
app.url=${APP_HOST:localhost}
logging.level.root=WARN
logging.level.com.api.transaction_aggregation=INFO
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.contexts=prod
